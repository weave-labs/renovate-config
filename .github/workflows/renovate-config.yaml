name: Renovate Config

on:
  pull_request:
    paths:
      - default.json
      - test/default_config_test.rb
      - .github/workflows/renovate-config.yaml

permissions:
  contents: read

jobs:
  policy-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run policy tests
        run: ruby test/default_config_test.rb

  validate:
    uses: weave-labs/ci/.github/workflows/renovate-config-validator.yaml@main
    with:
      config-file: default.json
      global-config: true
